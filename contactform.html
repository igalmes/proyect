<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contacto</title>
    <link rel="stylesheet" href="./a.css/style.css"/>
  </head>
  <header>
    <h1>Contactanos y dejanos tu mensaje!</h1>
  </header>
  <body>
    <script src="./form.js/form.js"></script>
    <form action="contactform.html">
      <div class="Firstmail">
        <label for="e-mail">Ingrese su correo electronico</label>
        <input type="email" placeholder="Ej: juan@gmail.com" class="input1";/>
      </div>
      <div>
        <label for="Password">Ingrese su clave</label>
        <input type="password" value=""/>
      </div>
      <input type="date" name="input2" id="timer"/>
      <br />
      <textarea
        name="Text"
        id="Textarea"
        cols="30"
        rows="10"
        ;
        placeholder="Escribi tu consulta y te contestaremos a la brevedad"
      ></textarea>
      <div>
        <label for="Upload a file"></label>
        <input type="file" name="piponeta" id="nose"/>
      </div>
      <div>
        <button type="submit" class="boton1">Confirmar</button>
      </div>
    </form>
  </body>
</html>
